    <script>
        let j1=1;
        let j2=0;
        let joueurTransformation = null;
        let nb_figure_j1 = 0;
        let nb_figure_j2 = 0;
        let reservation=1;
        let nb_resa=0;
        let joueurReservation = null;
        let fermés_restants=0;
        let droit_2points_j1=true;
        let droit_2points_j2=true;
        let droit_1pfigure_j1=true;
        let droit_1pfigure_j2=true;
        let skin_j1 = document.getElementById('skin_j1').value;
        let skin_j2 = document.getElementById('skin_j2').value;
        let destruction=0
        let joueurSacrifice = null;
        let ouverture=0;
        document.getElementById('skin_j1').addEventListener('input', function() {
            skin_j1 = this.value;
        });
        document.getElementById('skin_j2').addEventListener('input', function() {
            skin_j2 = this.value;
        });
        genererGrille();
        function genererGrille() {
            nb_figure_j1 = 0;
            nb_figure_j2 = 0;
            document.getElementById('grille').innerHTML = "";
            const ligne = document.getElementById('ligne').value;
            const colonne = document.getElementById('colonne').value;
            const grille = document.createElement('table');
            grille.style="text-align: center; border-collapse: collapse; margin: 0 auto;";
            grille.style.border="1px solid black";
            for (let i = 0; i < ligne; i++) {
                const tr = document.createElement('tr');
                tr.style.border="1px solid black";
                for (let j = 0; j < colonne; j++) {
                    const td = document.createElement('td');
                    td.style="width: 30px; height: 30px; border: 1px solid black; text-align: center; font-size: 20px;";
                    td.textContent = " ";
                    td.addEventListener('click', premierTourClick);
                    tr.appendChild(td);
                }
                grille.appendChild(tr);
            }
            document.getElementById('grille').appendChild(grille);
        }
        
        function jouer(element){
            if(element.textContent==" "){
                let skip=false;
                if(j1<=j2 && !(element.style.backgroundColor === "gold")){
                    element.textContent=skin_j2;
                    droit_2points_j2=true;
                    droit_1pfigure_j1=true;
                    j1++;
                    if (est_victoire(skin_j2)) {
                    setTimeout(() => {
                            alert("Le joueur "+skin_j2+" a gagné !");
                        }, 100);
                    }
                    document.getElementById('coups-j2').textContent = parseInt(document.getElementById('coups-j2').textContent) - 1;
                    if (document.getElementById('coups-j2').textContent == "0" && document.getElementById('coups-j1').textContent === "0") {
                        document.getElementById('coups-j1').textContent = parseInt(document.getElementById('coups-j1').textContent) + 1;
                    }
                    
                    if (fermés_restants > 0){
                        element.classList.add("utilisé");
                        fermés_restants--;
                    }
                    
                    skip=true;
                    
                    
                }
                else if(j2<j1 && !(element.style.backgroundColor === "purple") && skip===false){
                    element.textContent=skin_j1;
                    droit_2points_j1=true;
                    droit_1pfigure_j2=true;
                    j2++;
                    if (est_victoire(skin_j1)) {
                        setTimeout(() => {
                            alert("Le joueur " + skin_j1 + " a gagné !");
                        }, 100);
                    }
                    document.getElementById('coups-j1').textContent = parseInt(document.getElementById('coups-j1').textContent) - 1;
                        if (document.getElementById('coups-j1').textContent == "0" && document.getElementById('coups-j2').textContent === "0") {
                            document.getElementById('coups-j2').textContent = parseInt(document.getElementById('coups-j2').textContent) + 1;
                        }
                        if (fermés_restants > 0){
                        element.classList.add("utilisé");
                        fermés_restants--;
                    }
                    
                    
                }

            else{
                if (element.classList.contains("selectionner")||element.classList.contains("utilisé")){
                    element.classList.remove("selectionner");
                }
                else {
                    element.classList.add("selectionner");
                }
            
            }
        skip=false;

        }
        function jouerClick(e){
    jouer(e.currentTarget);
}

            }

            alert("Veuillez sélectionner des points du même joueur");
        }
        
            if (document.getElementById('selectionner').value == "1"){

                            }

                            }
                    }
                
                }
            
                else {

                }
            
        }
            else if (document.getElementById('selectionner').value == "2"){

                    joueurTransformation = firstContent;

for (let td of document.querySelectorAll('td')) {
    td.addEventListener('click', transformationClick);
}

}
                    
                
            
                else {

            else if (document.getElementById('selectionner').value == "3"){

                    if (firstContent == skin_j2){

                        figure_realise(Array.from(cases), firstContent);
                        j1-=nb_figure_j1;
                        document.getElementById('coups-j2').textContent = parseInt(document.getElementById('coups-j2').textContent) + nb_figure_j1;
                        droit_1pfigure_j2=false;
                    }
                        else {

                        }
                    }
                    else if (firstContent == skin_j1){
                        if (droit_1pfigure_j1){
                        figure_realise(Array.from(cases), firstContent);
                        j2-=nb_figure_j2;
                        document.getElementById('coups-j1').textContent = parseInt(document.getElementById('coups-j1').textContent) + nb_figure_j2;
                            droit_1pfigure_j1=false;
                    }

                             alert("Vous avez déjà utilisé 1 point/figure ce tour-ci")

                        }                    }

        document.getElementById('reservations-j1').style.display = 'block';

        document.getElementById('t_reservations-j2').style.display = 'block';
        document.getElementById('reservations-j2').textContent = nb_resa;
    }
                }

            if (document.getElementById('selectionner').value == "5"){

            if (document.getElementById('selectionner').value == "6"){
                if (est_troisfermés(Array.from(cases))){
                    figure_realise(Array.from(cases), firstContent);
                    if (firstContent == skin_j2){

                    }

                        document.getElementById('coups-j1').textContent = parseInt(document.getElementById('coups-j1').textContent) + 4;
                    }

                }
            
                else {
                    alert("Les points ne forment pas la figure des +4 fermés");
                }
            }
            if (document.getElementById('selectionner').value == "7"){
                if (est_reservation_fig(Array.from(cases))){

        document.getElementById('t_reservations-j1').style.display = 'block';

    else if (joueurReservation===skin_j2){
        document.getElementById('reservations-j2').style.display = 'block';
        document.getElementById('t_reservations-j2').style.display = 'block';

                    for (let td of document.querySelectorAll('td')) {

                }

            }

                    for (let td of document.querySelectorAll('td')) {

                else {

                }
            }
        document.getElementById('selectionner').value = "";}
    

    function figure_realise(cases, joueur){
        if(joueur == skin_j2){
            nb_figure_j1++;
        }
        else if(joueur == skin_j1){
            nb_figure_j2++;
        }

            cases.forEach(c => {
                c.classList.remove("selectionner");
                c.classList.add("utilisé");

                
            });
        }
    
    function premierTourClick(e){
        premierTour(e.currentTarget);
    }
    function premierTour(element) {
        element.textContent = skin_j1;
        element.classList.add("utilisé");
        j2++;
        document.getElementById('coups-j1').textContent = parseInt(document.getElementById('coups-j1').textContent) - 1;
        document.getElementById('coups-j2').textContent = parseInt(document.getElementById('coups-j2').textContent) + 1;
        document.querySelectorAll("td").forEach((td) => {
            td.removeEventListener('click', premierTourClick);
        });
        document.querySelectorAll("td").forEach((td) => {

        });
    
   }     

        function deSelectionner(){
            const cases = document.querySelectorAll('#grille td');
            cases.forEach(c => {
                if(c.classList.contains("selectionner")){
                    c.classList.remove("selectionner");
                }
            });
        }
        function getCoords(td) {
            const row = td.parentElement.rowIndex;
            const col = td.cellIndex;
            return { row, col };
        }

        function estAngle(cases){
    if(cases.length !== 3) return false;

    const coords = cases.map(c => getCoords(c));

    function adjacent(a,b){
        return (
            (Math.abs(a.row - b.row) === 1 && a.col === b.col) ||
            (Math.abs(a.col - b.col) === 1 && a.row === b.row)
        );
    }

    // tester chaque point comme centre potentiel
    for(let i=0;i<3;i++){
        let centre = coords[i];
        let autres = coords.filter((_,idx)=>idx!==i);

        if(adjacent(centre, autres[0]) && adjacent(centre, autres[1])){
            return true;
        }
    }

    return false;
}
function est_transformation(cases){
    if(cases.length !== 4) return false;

    // modèle de base
    let baseShape = [
        [0,0],[0,1],
        [1,0],[1,2]
    ];

    function getCoords(td){
        const tr = td.parentElement;
        const table = tr.parentElement;
        return {
            row: Array.from(table.children).indexOf(tr),
            col: Array.from(tr.children).indexOf(td)
        };
    }

    let coords = cases.map(c => {
        let p = getCoords(c);
        return [p.row, p.col];
    });

    // normalise coordonnées
    function normalize(shape){
        let minR = Math.min(...shape.map(p=>p[0]));
        let minC = Math.min(...shape.map(p=>p[1]));
        return shape
            .map(p=>[p[0]-minR, p[1]-minC])
            .sort((a,b)=> a[0]-b[0] || a[1]-b[1]);
    }

    // rotation 90°
    function rotate(shape){
        return shape.map(([r,c]) => [c, -r]);
    }

    // miroir horizontal
    function mirror(shape){
        return shape.map(([r,c]) => [r, -c]);
    }

    function sameShape(a,b){
        return JSON.stringify(a) === JSON.stringify(b);
    }

    let target = normalize(coords);

    let variants = [];
    let shape = baseShape;

    // 4 rotations
    for(let i=0;i<4;i++){
        variants.push(normalize(shape));
        variants.push(normalize(mirror(shape)));
        shape = rotate(shape);
    }

    return variants.some(v => sameShape(v,target));
}
function transformation(td, joueur){
    td.textContent = joueur;
    td.classList.remove("utilisé");
    setTimeout(() => {
        td.classList.remove("selectionner");
    }, 1);
}

function transformationClick(e){

}

function est_4_point_en_zigzag(cases){
    if(cases.length !== 5) return false;

    // forme de base
    let baseShape = [
        [0,0],
        [1,1],
        [2,0],
        [3,1],
        [4,0]
    ];

    function getCoords(td){
        const tr = td.parentElement;
        const table = tr.parentElement;
        return {
            row: Array.from(table.children).indexOf(tr),
            col: Array.from(tr.children).indexOf(td)
        };
    }

    let coords = cases.map(c => {
        let p = getCoords(c);
        return [p.row, p.col];
    });

    function normalize(shape){
        let minR = Math.min(...shape.map(p=>p[0]));
        let minC = Math.min(...shape.map(p=>p[1]));
        return shape
            .map(p=>[p[0]-minR, p[1]-minC])
            .sort((a,b)=> a[0]-b[0] || a[1]-b[1]);
    }

    function rotate(shape){
        return shape.map(([r,c]) => [c, -r]);
    }

    function mirror(shape){
        return shape.map(([r,c]) => [r, -c]);
    }

    function sameShape(a,b){
        return JSON.stringify(a) === JSON.stringify(b);
    }

    let target = normalize(coords);

    let variants = [];
    let shape = baseShape;

    for(let i=0;i<4;i++){
        variants.push(normalize(shape));
        variants.push(normalize(mirror(shape)));
        shape = rotate(shape);
    }

    return variants.some(v => sameShape(v,target));
}
function est_reservation(cases){
    if(cases.length < 3) return false;

    const coords = cases.map(td => ({
        row: td.parentElement.rowIndex,
        col: td.cellIndex
    }));

    const sameRow = coords.every(c => c.row === coords[0].row);
    const sameCol = coords.every(c => c.col === coords[0].col);

function est_rase_board(cases){
    if(cases.length !== 6) return false;

    // forme de base
    let baseShape = [
        [0,0],
        [1,0],
        [2,-1],
        [2,-2],
        [1,-3],
        [0,-3]
    ];

    function getCoords(td){
        const tr = td.parentElement;
        const table = tr.parentElement;
        return {
            row: Array.from(table.children).indexOf(tr),
            col: Array.from(tr.children).indexOf(td)
        };
    }

    let coords = cases.map(c => {
        let p = getCoords(c);
        return [p.row, p.col];
    });

    function normalize(shape){
        let minR = Math.min(...shape.map(p=>p[0]));
        let minC = Math.min(...shape.map(p=>p[1]));
        return shape
            .map(p=>[p[0]-minR, p[1]-minC])
            .sort((a,b)=> a[0]-b[0] || a[1]-b[1]);
    }

    function rotate(shape){
        return shape.map(([r,c]) => [c, -r]);
    }

    function mirror(shape){
        return shape.map(([r,c]) => [r, -c]);
    }

    function sameShape(a,b){
        return JSON.stringify(a) === JSON.stringify(b);
    }

    let target = normalize(coords);

    let variants = [];
    let shape = baseShape;

    for(let i=0;i<4;i++){
        variants.push(normalize(shape));
        variants.push(normalize(mirror(shape)));
        shape = rotate(shape);
    }

    return variants.some(v => sameShape(v,target));
}

function est_victoire(joueur){

    const table = document.querySelector("#grille table");
    const lignes = table.rows.length;
    const colonnes = table.rows[0].cells.length;

    for(let r = 0; r <= lignes-4; r++){
        for(let c = 0; c <= colonnes-4; c++){

            let victoire = true;

            for(let i = 0; i < 4; i++){
                for(let j = 0; j < 4; j++){

                    // uniquement le bord du carré
                    if(i === 0 || i === 3 || j === 0 || j === 3){

                        let cell = table.rows[r+i].cells[c+j];

                        if(cell.textContent !== joueur){
                            victoire = false;
                            break;
                        }

                    }

                }
                if(!victoire) break;
            }

            if(victoire){
                return true;
            }

        }
    }

    return false;
}
