<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Memory</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: red;
            margin-bottom: 20px;
        }
        .game-board_melange {
            display: grid;
            grid-template-columns: repeat(4, 150px);
            gap: 50px;
            margin-bottom: 20px;
        }
        .game-board_carre {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            width: 100px;
            height: 100px;
            background: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 40px;
            transition: transform  0.2s;
        }
        .card:hover {
            /* Ajoute un scale sans écraser la rotation dynamique */
            transform: scale(1.15);
        }
         input:hover {
            /* Ajoute un scale sans écraser la rotation dynamique */
            transform: scale(1.15);
            transition: transform  0.2s;
        }
         button:hover {
            /* Ajoute un scale sans écraser la rotation dynamique */
            transform: scale(1.07);
            transition: transform  0.2s;
        }
        .game-board_melange .card:hover {
            /* Pour le plateau mélangé, combine la rotation dynamique et le zoom */
            transform: var(--rotate, none) scale(1.15) !important;
        }
        .card.retournées {
            background: #667eea;
            color: white;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: white;
            border: none;
            border-radius: 5px;
        }
        .joueur {
    padding: 10px;
    font-size: 16px;
    width: 120px;
    border-radius: 5px;
    border: none;
    text-align: center;
}
        .zone-jeu {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;

            .zone-joueur {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

        }

    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: red;">Memory</h1><br>
        <input type="radio" id="1joueur" name="Nbjoueurs" onclick="reinitialisation()" checked> 1 Joueur </input>
        <input type="radio" id="2joueurs" name="Nbjoueurs" onclick="reinitialisation()"> 2 Joueurs </input>
        <br><br>
        <input type="radio" id="p_carré" name="Plateau" onclick="reinitialisation()" checked> Plateau carré </input>
        <input type="radio" id="p_melange" name="Plateau" onclick="reinitialisation()"> Plateau mélangé </input>
        <br><br><br>
        <div class="zone-jeu">
        <div class="zone-joueur multi">
    <input type="text" class="joueur" id="nomJoueur1" value="1er Joueur">
    <p id="pointJoueur1" style="font-size: 40px;">0</p>
</div>

        <div id="gameBoard"></div>

        <div class="zone-joueur multi">
    <input type="text" class="joueur" id="nomJoueur2" value="2ème Joueur">
    <p id="pointJoueur2" style="font-size: 40px;">0</p>
</div>

</div>
        <button onclick="reinitialisation()">Nouvelle partie</button>
   <div id="Score 1joueur"> <h2>Nombre de coups : </h2> <h2 id="score">0</h2> </div>
    
   

    <script>
        const emojis = ['🎷', '🎻', '🎺', '🪘', '🪕', '🎼', '🪗', '🪈'];
        let liste_cartes = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
        let retournées = [];
        let trouvées = [];

        function initialisation() {
            const board = document.getElementById('gameBoard');
            if (document.getElementById("p_carré").checked) {
                board.className = 'game-board_carre';
            } else {
                board.className = 'game-board_melange';
            }
            board.innerHTML = '';
            liste_cartes.forEach((emoji, index) => {
                const card = document.createElement('button');
                card.className = 'card';
                card.textContent = '🎶';
                if (document.getElementById("p_melange").checked) {
                const rotate = `rotate(${Math.random() * 100 - 3}deg) translateX(${Math.random() * 120 - 5}px) translateY(${Math.random() * 45 - 5}px)`;
                card.style.setProperty('--rotate', rotate);
                card.style.transform = 'var(--rotate)';
                }
                card.onclick = () => retournerCarte(index, card);
                board.appendChild(card);
                
            });
            if (document.getElementById("1joueur").checked){
                document.getElementById("Score 1joueur").style.display = 'block';
            } else {
                document.getElementById("Score 1joueur").style.display = 'none'; 
            }
            if (document.getElementById("2joueurs").checked){
                document.getElementsByClassName("zone-joueur multi")[0].style.display = 'block';
                document.getElementsByClassName("zone-joueur multi")[1].style.display = 'block';
            } else {
                document.getElementsByClassName("zone-joueur multi")[0].style.display = 'none';
                document.getElementsByClassName("zone-joueur multi")[1].style.display = 'none';
            }


            document.getElementById("score").innerHTML = '0';
            document.getElementById("pointJoueur1").innerHTML = '0';
            document.getElementById("pointJoueur2").innerHTML = '0';
        }

        function retournerCarte(index, card) {
            if (retournées.length < 2 && !trouvées.includes(index) && !retournées.includes(index)) {
                card.textContent = liste_cartes[index];
                card.classList.add('retournées');
                retournées.push(index);

                if (retournées.length === 2) {
                    setTimeout(concordance, 1000);
                    let p=document.getElementById("score");
                    p.innerHTML =parseInt(p.innerHTML)+1;
                }
            }
        }

        function concordance() {
            const [first, second] = retournées;
            if (liste_cartes[first] === liste_cartes[second]) {
                trouvées.push(first, second);
                if (parseInt(document.getElementById("score").textContent)%2===0) {
                    let scoreJoueur2 = document.getElementById("pointJoueur2");
                    scoreJoueur2.textContent = parseInt(scoreJoueur2.textContent) + 1;
                } else {
                    let scoreJoueur1 = document.getElementById("pointJoueur1");
                    scoreJoueur1.textContent = parseInt(scoreJoueur1.textContent) + 1;
                }
                
            } 
            else {
                document.querySelectorAll('.card').forEach((card, i) => {
                    if (!trouvées.includes(i)) {
                        card.textContent = '🎶';
                        card.classList.remove('retournées');
                    }
                });
            }
            if (liste_cartes[first] === liste_cartes[second]) {
                document.querySelectorAll('.card')[first].style.visibility = 'hidden';
                 document.querySelectorAll('.card')[second].style.visibility = 'hidden';
                document.querySelectorAll('.card')[second].classList.add('found');
            }
            retournées = [];

setTimeout(finDePartie, 50);

        }

            function finDePartie() {
    if (trouvées.length !== liste_cartes.length) return;

    let coups = parseInt(document.getElementById("score").textContent);

    if (document.getElementById("1joueur").checked) {
        alert('Vous avez gagné en ' + coups + ' coups !');
    } else {
        let scoreJoueur1 = parseInt(document.getElementById("pointJoueur1").textContent);
        let scoreJoueur2 = parseInt(document.getElementById("pointJoueur2").textContent);

        if (scoreJoueur1 > scoreJoueur2) {
            alert(document.getElementById("nomJoueur1").value + ' a gagné avec ' + scoreJoueur1 + ' points !');
        } else if (scoreJoueur2 > scoreJoueur1) {
            alert(document.getElementById("nomJoueur2").value + ' a gagné avec ' + scoreJoueur2 + ' points !');
        } else {
            alert('Égalité avec ' + scoreJoueur1 + ' points chacun !');
        }
    }
}

        

        function reinitialisation() {
            liste_cartes = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
            retournées = [];
            trouvées = [];
            initialisation();
        }

        initialisation();
    </script>
</body>
</html>
